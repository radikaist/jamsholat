<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Sholat Digital Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        .font-digital { font-family: 'Orbitron', sans-serif; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Animasi Running Text */
        .marquee-container { overflow: hidden; white-space: nowrap; position: relative; }
        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-6">

    <button onclick="toggleFullscreen()" class="fixed top-4 right-4 p-2 glass rounded-full hover:bg-white/10 transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>

    <audio id="audioAdzan" src="https://www.islamcan.com/audio/adzan/azan1.mp3" preload="auto"></audio>

    <div class="text-center mt-10">
        <h1 id="nama-kota" class="text-xl md:text-2xl uppercase tracking-[0.3em] text-slate-500 mb-2">Mencari Lokasi...</h1>
        <div id="jam" class="text-8xl md:text-[12rem] font-digital font-bold text-green-400 drop-shadow-[0_0_20px_rgba(74,222,128,0.3)]">
            00:00:00
        </div>
        <p id="tanggal" class="text-2xl mt-4 text-slate-400 font-light"></p>
    </div>

    <div id="jadwal-container" class="grid grid-cols-3 lg:grid-cols-6 gap-4 w-full max-w-7xl mb-10">
        </div>

    <div class="w-full glass py-3 absolute bottom-0 left-0">
        <div class="marquee-container">
            <div class="marquee-content text-lg text-yellow-400 uppercase tracking-widest font-semibold">
                "Jagalah sholatmu, maka Allah akan menjaga hidupmu" — Selamat menjalankan ibadah sholat di wilayah Bekasi dan sekitarnya — Mohon nonaktifkan HP saat adzan berkumandang.
            </div>
        </div>
    </div>

    <script>
        const KOTA_ID = '1206'; // ID Kabupaten Bekasi (Cikarang)
        let jadwalHariIni = {};
        let adzanPlayed = false;

        // 1. Logika Jam & Pemicu Adzan
        function updateJam() {
            const now = new Date();
            const jamStr = String(now.getHours()).padStart(2, '0');
            const menitStr = String(now.getMinutes()).padStart(2, '0');
            const detikStr = String(now.getSeconds()).padStart(2, '0');
            const waktuSekarang = `${jamStr}:${menitStr}`;
            
            document.getElementById('jam').innerText = `${jamStr}:${menitStr}:${detikStr}`;
            
            // Cek Waktu Sholat (Kecuali Terbit)
            const waktuPenting = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            
            waktuPenting.forEach(sholat => {
                if (jadwalHariIni[sholat] === waktuSekarang && !adzanPlayed) {
                    playAdzan();
                    adzanPlayed = true; 
                }
            });

            // Reset flag adzan di detik ke-01 setiap menit baru
            if (detikStr === "01") adzanPlayed = false;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', options);
        }

        // 2. Kontrol Adzan & Fullscreen
        function playAdzan() {
            const audio = document.getElementById('audioAdzan');
            audio.play().catch(e => console.log("Interaksi user diperlukan untuk memutar audio pertama kali."));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // 3. Ambil Data API
        async function fetchJadwal() {
            try {
                const tgl = new Date();
                const url = `https://api.myquran.com/v2/sholat/jadwal/${KOTA_ID}/${tgl.getFullYear()}/${tgl.getMonth() + 1}/${tgl.getDate()}`;
                const response = await fetch(url);
                const result = await response.json();
                jadwalHariIni = result.data.jadwal;
                document.getElementById('nama-kota').innerText = result.data.lokasi;
                renderJadwal(jadwalHariIni);
            } catch (error) {
                document.getElementById('nama-kota').innerText = "Koneksi Offline";
            }
        }

        function renderJadwal(jadwal) {
            const listSholat = ['subuh', 'terbit', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            const container = document.getElementById('jadwal-container');
            container.innerHTML = '';

            listSholat.forEach(key => {
                const card = document.createElement('div');
                card.className = `glass p-6 rounded-2xl text-center transition-all duration-700`;
                card.innerHTML = `
                    <div class="text-slate-500 text-xs mb-2 uppercase tracking-widest">${key}</div>
                    <div class="text-3xl font-bold font-digital text-white">${jadwal[key]}</div>
                `;
                container.appendChild(card);
            });
        }

        setInterval(updateJam, 1000);
        fetchJadwal();
        setInterval(fetchJadwal, 3600000); // Update data tiap jam
    </script>
</body>
</html>

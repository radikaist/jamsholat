<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Sholat Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        .font-digital { font-family: 'Orbitron', sans-serif; }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-sholat { background: rgba(34, 197, 94, 0.2); border-color: #22c55e; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center mb-10">
        <h1 id="nama-kota" class="text-2xl uppercase tracking-widest text-slate-400 mb-2">Memuat Lokasi...</h1>
        <div id="jam" class="text-7xl md:text-9xl font-digital font-bold text-green-400 drop-shadow-[0_0_15px_rgba(74,222,128,0.5)]">
            00:00:00
        </div>
        <p id="tanggal" class="text-xl mt-4 text-slate-300 italic"></p>
    </div>

    <div id="jadwal-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 w-full max-w-6xl">
        </div>

    <script>
        const KOTA_ID = '1221'; // ID untuk Kota Bekasi. Gunakan 1206 untuk Kab. Bekasi (Cikarang)
        const apiURL = `https://api.myquran.com/v2/sholat/jadwal/${KOTA_ID}/`;

        // 1. Fungsi Jam Real-time
        function updateJam() {
            const now = new Date();
            const jam = String(now.getHours()).padStart(2, '0');
            const menit = String(now.getMinutes()).padStart(2, '0');
            const detik = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('jam').innerText = `${jam}:${menit}:${detik}`;
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', options);
        }

        // 2. Fungsi Ambil Data API
        async function fetchJadwal() {
            try {
                const tgl = new Date();
                const y = tgl.getFullYear();
                const m = tgl.getMonth() + 1;
                const d = tgl.getDate();

                const response = await fetch(`${apiURL}${y}/${m}/${d}`);
                const result = await response.json();
                const data = result.data;

                document.getElementById('nama-kota').innerText = data.lokasi;
                renderJadwal(data.jadwal);
            } catch (error) {
                console.error("Gagal mengambil jadwal:", error);
                document.getElementById('nama-kota').innerText = "Gagal Memuat Data";
            }
        }

        // 3. Render ke HTML
        function renderJadwal(jadwal) {
            const listSholat = ['subuh', 'terbit', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            const container = document.getElementById('jadwal-container');
            container.innerHTML = '';

            listSholat.forEach(key => {
                const nama = key.charAt(0).toUpperCase() + key.slice(1);
                const waktu = jadwal[key];
                
                const card = document.createElement('div');
                card.className = `glass p-6 rounded-2xl text-center transition-all duration-500`;
                card.innerHTML = `
                    <div class="text-slate-400 text-sm mb-2 uppercase tracking-tighter">${nama}</div>
                    <div class="text-3xl font-bold font-digital">${waktu}</div>
                `;
                container.appendChild(card);
            });
        }

        // Jalankan fungsi
        setInterval(updateJam, 1000);
        fetchJadwal();
        
        // Refresh data setiap jam agar sinkron jika ganti hari
        setInterval(fetchJadwal, 3600000);
    </script>
</body>
</html>

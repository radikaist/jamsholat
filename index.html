<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Sholat Digital - By Radika Istiawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap');
        .font-digital { font-family: 'Orbitron', sans-serif; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 30s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .hidden { display: none !important; }
        .text-neon { text-shadow: 0 0 15px rgba(74, 222, 128, 0.4); }
        /* Custom Scrollbar for Admin Panel */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 md:p-8">

    <audio id="audioAdzan" preload="auto"></audio>

    <div class="fixed top-4 right-4 flex gap-2 z-40 no-print">
        <button onclick="toggleAdmin()" class="p-2 glass rounded-full opacity-20 hover:opacity-100 transition text-xs">⚙️ Settings</button>
        <button onclick="toggleFullscreen()" class="p-2 glass rounded-full opacity-20 hover:opacity-100 transition text-xs">🖥️ Fullscreen</button>
    </div>

    <div id="main-display" class="flex flex-col items-center justify-center h-full w-full flex-1 gap-4 md:gap-8">
        <div class="text-center">
            <h1 id="nama-kota-display" class="text-lg md:text-xl uppercase tracking-[0.4em] text-slate-500 mb-2 font-semibold italic">Mencari Lokasi...</h1>
            
            <div id="jam" class="text-6xl md:text-[11rem] font-digital font-bold text-green-400 text-neon leading-none">00:00:00</div>
            
            <div id="countdown-box" class="mt-4 px-5 py-1.5 glass rounded-full inline-block border-green-500/20">
                <span id="countdown-label" class="text-slate-400 uppercase tracking-widest text-[10px] md:text-xs">Menunggu...</span>
                <span id="countdown-timer" class="text-yellow-400 font-digital ml-2 text-base md:text-xl">--:--:--</span>
            </div>

            <div class="mt-6">
                <p id="tanggal-masehi" class="text-lg md:text-2xl text-slate-300 font-light"></p>
                <p id="tanggal-hijriah" class="text-base md:text-xl text-yellow-500/70 font-medium tracking-wide mt-1"></p>
            </div>
        </div>

        <div id="jadwal-grid" class="grid grid-cols-4 lg:grid-cols-8 gap-2 md:gap-4 w-full max-w-7xl">
            </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-slate-950/98 flex items-center justify-center hidden z-50 p-4">
        <div class="glass p-6 md:p-10 rounded-3xl w-full max-w-xl border-green-500/30 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-green-400 leading-tight">Pengaturan Personal</h2>
                    <p class="text-xs text-slate-500">Data disimpan lokal di browser Anda.</p>
                </div>
                <button onclick="toggleAdmin()" class="text-slate-400 hover:text-white bg-slate-800 p-2 rounded-lg">Tutup</button>
            </div>
            
            <div class="space-y-6 text-left">
                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold tracking-wider">📍 Pilih Kota / Kabupaten</label>
                    <div class="flex gap-2 mt-2">
                        <input type="text" id="search-city" placeholder="Ketik nama kota..." class="flex-1 p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none focus:border-green-500 text-white transition">
                        <button onclick="searchCity()" class="bg-blue-600 px-5 rounded-xl text-white font-bold hover:bg-blue-700">Cari</button>
                    </div>
                    <div id="city-results" class="mt-3 space-y-1 max-h-40 overflow-y-auto pr-2"></div>
                </div>

                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold tracking-wider">📜 Running Text Anda</label>
                    <textarea id="input-text" rows="2" placeholder="Tulis pengingat sholat atau pesan di sini..." class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 mt-2 outline-none text-white focus:border-green-500"></textarea>
                </div>

                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold tracking-wider">🎵 URL Suara Adzan (.mp3)</label>
                    <input type="text" id="input-audio" placeholder="https://domain.com/adzan.mp3" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 mt-2 text-white outline-none focus:border-green-500">
                </div>

                <div class="pt-4">
                    <button onclick="saveSettings()" class="w-full bg-green-600 hover:bg-green-700 p-4 rounded-2xl font-bold text-lg transition text-white shadow-lg shadow-green-900/20">
                        Simpan Perubahan
                    </button>
                    <p class="text-center text-[10px] text-slate-600 mt-4 italic">Jam Sholat Digital Pro v2.5 | Radika Istiawan</p>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-marquee" class="w-full glass py-3 absolute bottom-0 left-0 border-t border-white/5">
        <div class="overflow-hidden whitespace-nowrap">
            <div id="running-text-display" class="marquee-content text-sm md:text-lg text-yellow-400 font-medium uppercase tracking-[0.2em]">
                Memuat pesan personal...
            </div>
        </div>
    </div>

    <script>
        // Default Kota Bekasi (1206) jika user belum pernah mensetting
        let currentCityId = localStorage.getItem('s_city_id') || '1206';
        let jadwalHariIni = {};
        let adzanPlayed = false;

        // 1. UPDATE JAM & LOGIKA HARIAN
        function clockCycle() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('jam').innerText = `${h}:${m}:${s}`;
            document.getElementById('tanggal-masehi').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

            if (Object.keys(jadwalHariIni).length > 0) {
                calcCountdown(now);
                triggerAdzan(`${h}:${m}`);
            }
        }

        // 2. AMBIL JADWAL DARI API
        async function fetchJadwal() {
            try {
                const t = new Date();
                const res = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${currentCityId}/${t.getFullYear()}/${t.getMonth()+1}/${t.getDate()}`);
                const resJson = await res.json();
                jadwalHariIni = resJson.data.jadwal;
                
                document.getElementById('nama-kota-display').innerText = resJson.data.lokasi;

                // Hitung Hijriah secara Lokal (Lebih stabil & anti-undefined)
                try {
                    const hijri = new Intl.DateTimeFormat('id-ID-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric'}).format(t);
                    document.getElementById('tanggal-hijriah').innerText = hijri + " H";
                } catch(e) { document.getElementById('tanggal-hijriah').innerText = ""; }

                renderGrid();
            } catch (e) {
                document.getElementById('nama-kota-display').innerText = "OFFLINE MODE";
            }
        }

        function renderGrid() {
            const keys = [
                {k:'imsak', l:'Imsak'}, {k:'subuh', l:'Subuh'}, {k:'terbit', l:'Syuruq'}, {k:'dhuha', l:'Dhuha'},
                {k:'dzuhur', l:'Dzuhur'}, {k:'ashar', l:'Ashar'}, {k:'maghrib', l:'Maghrib'}, {k:'isya', l:'Isya'}
            ];
            const container = document.getElementById('jadwal-grid');
            container.innerHTML = '';
            keys.forEach(item => {
                container.innerHTML += `
                    <div class="glass p-3 md:p-6 rounded-2xl text-center border-b-2 border-transparent hover:border-green-500 transition-all duration-300">
                        <div class="text-slate-500 text-[9px] md:text-xs uppercase mb-1 font-bold tracking-widest">${item.l}</div>
                        <div class="text-lg md:text-2xl font-bold font-digital text-white">${jadwalHariIni[item.k] || '--:--'}</div>
                    </div>`;
            });
        }

        // 3. COUNTDOWN & ADZAN
        function calcCountdown(now) {
            const list = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            let next = null; let nextT = null;

            for (let s of list) {
                const tArr = jadwalHariIni[s].split(':');
                const pDate = new Date();
                pDate.setHours(parseInt(tArr[0]), parseInt(tArr[1]), 0);
                if (pDate > now) { next = s; nextT = pDate; break; }
            }

            const label = document.getElementById('countdown-label');
            const timer = document.getElementById('countdown-timer');

            if (next) {
                const diff = nextT - now;
                const hrs = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                label.innerText = `Menuju ${next}`;
                timer.innerText = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            } else {
                label.innerText = "Menuju Subuh Esok";
                timer.innerText = "--:--:--";
            }
        }

        function triggerAdzan(hm) {
            const wajib = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            wajib.forEach(sName => {
                if (jadwalHariIni[sName] === hm && !adzanPlayed) {
                    const audio = document.getElementById('audioAdzan');
                    if(audio.src) audio.play().catch(e => console.log("Klik layar untuk aktifkan suara"));
                    adzanPlayed = true;
                }
            });
            if (new Date().getSeconds() === 0) adzanPlayed = false;
        }

        // 4. ADMIN & SEARCH (LOCALSTORAGE LOGIC)
        async function searchCity() {
            const q = document.getElementById('search-city').value;
            if(q.length < 3) return;
            const res = await fetch(`https://api.myquran.com/v2/sholat/kota/cari/${q}`);
            const data = await res.json();
            const resDiv = document.getElementById('city-results');
            resDiv.innerHTML = '';
            data.data.forEach(item => {
                resDiv.innerHTML += `
                    <button onclick="selectCity('${item.id}', '${item.lokasi}')" class="w-full text-left p-3 bg-slate-800 hover:bg-green-700 rounded-xl text-xs mb-1 text-white transition">
                        ${item.lokasi}
                    </button>`;
            });
        }

        function selectCity(id, nama) {
            currentCityId = id;
            localStorage.setItem('s_city_id', id);
            saveSettings();
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('hidden');
            if(!panel.classList.contains('hidden')) {
                document.getElementById('input-text').value = localStorage.getItem('s_text') || "Selamat Menjalankan Ibadah Sholat - jamsholat.radika.id";
                document.getElementById('input-audio').value = localStorage.getItem('s_audio') || "https://www.islamcan.com/audio/adzan/azan1.mp3";
            }
        }

        function saveSettings() {
            localStorage.setItem('s_text', document.getElementById('input-text').value);
            localStorage.setItem('s_audio', document.getElementById('input-audio').value);
            localStorage.setItem('s_city_id', currentCityId);
            applySettings();
            fetchJadwal();
            if(!document.getElementById('admin-panel').classList.contains('hidden')) toggleAdmin();
        }

        function applySettings() {
            document.getElementById('running-text-display').innerText = localStorage.getItem('s_text') || "Selamat Menjalankan Ibadah Sholat - jamsholat.radika.id";
            const aud = document.getElementById('audioAdzan');
            const savedAud = localStorage.getItem('s_audio');
            if(savedAud) aud.src = savedAud;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        // INIT APP
        setInterval(clockCycle, 1000);
        applySettings();
        fetchJadwal();
        // Refresh jadwal tiap jam
        setInterval(fetchJadwal, 3600000);
    </script>
</body>
</html>

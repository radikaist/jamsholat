<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Sholat Digital Pro - Countdown & Syuruq</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap');
        .font-digital { font-family: 'Orbitron', sans-serif; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .hidden { display: none; }
        .text-neon { text-shadow: 0 0 15px rgba(74, 222, 128, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-6">

    <audio id="audioAdzan" preload="auto"></audio>

    <div class="fixed top-4 right-4 flex gap-2 no-print z-40">
        <button onclick="toggleAdmin()" class="p-2 glass rounded-full opacity-30 hover:opacity-100 transition">⚙️ Pengaturan</button>
        <button onclick="toggleFullscreen()" class="p-2 glass rounded-full opacity-30 hover:opacity-100 transition">🖥️ Layar Penuh</button>
    </div>

    <div id="main-display" class="flex flex-col items-center justify-center h-full w-full flex-1 gap-8">
        <div class="text-center">
            <h1 id="nama-kota-display" class="text-xl md:text-2xl uppercase tracking-[0.4em] text-slate-500 mb-2 font-semibold italic">Memuat Lokasi...</h1>
            
            <div id="jam" class="text-7xl md:text-[11rem] font-digital font-bold text-green-400 text-neon">00:00:00</div>
            
            <div id="countdown-box" class="mt-4 px-6 py-2 glass rounded-full inline-block border-green-500/20">
                <span id="countdown-label" class="text-slate-400 uppercase tracking-widest text-sm">Mencari Jadwal...</span>
                <span id="countdown-timer" class="text-yellow-400 font-digital ml-2 text-xl">--:--:--</span>
            </div>

            <p id="tanggal" class="text-xl md:text-2xl mt-6 text-slate-400 font-light"></p>
        </div>

        <div id="jadwal-grid" class="grid grid-cols-3 lg:grid-cols-6 gap-4 w-full max-w-7xl">
            </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-slate-950/98 flex items-center justify-center hidden z-50 p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-xl border-green-500/30 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-green-400">⚙️ Pengaturan Sistem</h2>
                <button onclick="toggleAdmin()" class="text-slate-400 hover:text-white">Tutup [X]</button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold">📍 Lokasi (Cari Kota)</label>
                    <div class="flex gap-2 mt-1">
                        <input type="text" id="search-city" placeholder="Ketik nama kota..." class="flex-1 p-3 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-green-500">
                        <button onclick="searchCity()" class="bg-blue-600 px-4 rounded-xl hover:bg-blue-700 transition">Cari</button>
                    </div>
                    <div id="city-results" class="mt-2 space-y-1 max-h-32 overflow-y-auto"></div>
                    <p id="current-city-id" class="text-[10px] text-green-500 mt-1 uppercase font-semibold"></p>
                </div>

                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold">📜 Pesan Berjalan</label>
                    <textarea id="input-text" rows="2" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 mt-1 outline-none focus:border-green-500"></textarea>
                </div>

                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold">🎵 Link Suara Adzan (.mp3)</label>
                    <input type="text" id="input-audio" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 mt-1 outline-none focus:border-green-500">
                </div>

                <button onclick="saveSettings()" class="w-full bg-green-600 hover:bg-green-700 p-4 rounded-xl font-bold text-lg shadow-lg shadow-green-900/20 transition text-white">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <div id="footer-marquee" class="w-full glass py-4 absolute bottom-0 left-0">
        <div class="overflow-hidden whitespace-nowrap">
            <div id="running-text-display" class="marquee-content text-xl text-yellow-400 font-semibold uppercase tracking-widest">
                Memuat pesan...
            </div>
        </div>
    </div>

    <script>
        let currentCityId = localStorage.getItem('s_city_id') || '1206';
        let jadwalHariIni = {};
        let adzanPlayed = false;

        // 1. LOGIKA JAM & COUNTDOWN
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const timeNowStr = `${h}:${m}:${s}`;
            const timeNowHM = `${h}:${m}`;
            
            document.getElementById('jam').innerText = timeNowStr;
            document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

            if (Object.keys(jadwalHariIni).length > 0) {
                calculateCountdown(now);
                checkAdzan(timeNowHM);
            }
        }

        function calculateCountdown(now) {
            const listSholat = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            let nextSholat = null;
            let nextTime = null;

            for (let sholat of listSholat) {
                const [pHour, pMin] = jadwalHariIni[sholat].split(':');
                const pDate = new Date();
                pDate.setHours(pHour, pMin, 0);

                if (pDate > now) {
                    nextSholat = sholat;
                    nextTime = pDate;
                    break;
                }
            }

            const labelEl = document.getElementById('countdown-label');
            const timerEl = document.getElementById('countdown-timer');

            if (nextSholat) {
                const diff = nextTime - now;
                const hours = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                
                labelEl.innerText = `Menuju ${nextSholat}`;
                timerEl.innerText = `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            } else {
                labelEl.innerText = "Menunggu Subuh Esok";
                timerEl.innerText = "--:--:--";
            }
        }

        function checkAdzan(timeHM) {
            const sholatWajib = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            sholatWajib.forEach(sName => {
                if (jadwalHariIni[sName] === timeHM && !adzanPlayed) {
                    document.getElementById('audioAdzan').play().catch(e => console.log("Klik layar untuk aktifkan suara"));
                    adzanPlayed = true;
                }
            });
            if (new Date().getSeconds() === 0) adzanPlayed = false;
        }

        // 2. LOGIKA DATA JADWAL
        async function fetchJadwal() {
            try {
                const t = new Date();
                const res = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${currentCityId}/${t.getFullYear()}/${t.getMonth()+1}/${t.getDate()}`);
                const result = await res.json();
                jadwalHariIni = result.data.jadwal;
                document.getElementById('nama-kota-display').innerText = result.data.lokasi;
                renderJadwal();
            } catch (e) {
                document.getElementById('nama-kota-display').innerText = "Mode Offline";
            }
        }

        function renderJadwal() {
            const list = [
                {key: 'subuh', label: 'Subuh'},
                {key: 'terbit', label: 'Syuruq'},
                {key: 'dzuhur', label: 'Dzuhur'},
                {key: 'ashar', label: 'Ashar'},
                {key: 'maghrib', label: 'Maghrib'},
                {key: 'isya', label: 'Isya'}
            ];
            const container = document.getElementById('jadwal-grid');
            container.innerHTML = '';
            list.forEach(item => {
                container.innerHTML += `
                    <div class="glass p-6 rounded-2xl text-center border-b-2 border-transparent hover:border-green-500 transition-all duration-500">
                        <div class="text-slate-500 text-xs uppercase mb-1 font-bold tracking-widest">${item.label}</div>
                        <div class="text-3xl font-bold font-digital text-white">${jadwalHariIni[item.key]}</div>
                    </div>`;
            });
        }

        // 3. ADMIN & SETTINGS
        async function searchCity() {
            const query = document.getElementById('search-city').value;
            if(query.length < 3) return alert("Ketik minimal 3 huruf");
            const res = await fetch(`https://api.myquran.com/v2/sholat/kota/cari/${query}`);
            const result = await res.json();
            const list = result.data;
            const resultDiv = document.getElementById('city-results');
            resultDiv.innerHTML = '';
            list.forEach(item => {
                resultDiv.innerHTML += `
                    <button onclick="selectCity('${item.id}', '${item.lokasi}')" class="w-full text-left p-3 bg-slate-800 hover:bg-green-700 rounded-xl text-sm mb-1 transition text-white">
                        ${item.lokasi}
                    </button>`;
            });
        }

        function selectCity(id, nama) {
            currentCityId = id;
            document.getElementById('current-city-id').innerText = "Terpilih: " + nama;
            document.getElementById('city-results').innerHTML = '';
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('hidden');
            if(!panel.classList.contains('hidden')) {
                document.getElementById('input-text').value = localStorage.getItem('s_text') || "Jagalah sholatmu, maka Allah akan menjaga hidupmu";
                document.getElementById('input-audio').value = localStorage.getItem('s_audio') || "https://www.islamcan.com/audio/adzan/azan1.mp3";
                document.getElementById('current-city-id').innerText = "ID Lokasi Aktif: " + currentCityId;
            }
        }

        function saveSettings() {
            localStorage.setItem('s_text', document.getElementById('input-text').value);
            localStorage.setItem('s_audio', document.getElementById('input-audio').value);
            localStorage.setItem('s_city_id', currentCityId);
            applySettings();
            fetchJadwal();
            toggleAdmin();
        }

        function applySettings() {
            document.getElementById('running-text-display').innerText = localStorage.getItem('s_text') || "Jagalah sholatmu, maka Allah akan menjaga hidupmu";
            document.getElementById('audioAdzan').src = localStorage.getItem('s_audio') || "https://www.islamcan.com/audio/adzan/azan1.mp3";
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        setInterval(updateClock, 1000);
        applySettings();
        fetchJadwal();
    </script>
</body>
</html>

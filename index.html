<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Display Jam Sholat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        .font-digital { font-family: 'Orbitron', sans-serif; }
        body { background-color: #020617; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-10">

    <audio id="audioAdzan" preload="auto"></audio>

    <div class="text-center">
        <h1 id="nama-kota" class="text-2xl uppercase tracking-[0.3em] text-slate-500 mb-2">Memuat...</h1>
        <div id="jam" class="text-[10rem] font-digital font-bold text-green-400">00:00:00</div>
        <p id="tanggal" class="text-2xl text-slate-400"></p>
    </div>

    <div id="jadwal-container" class="grid grid-cols-6 gap-4 w-full max-w-7xl mb-20"></div>

    <div class="w-full glass py-4 absolute bottom-0 left-0">
        <div class="overflow-hidden whitespace-nowrap">
            <div id="running-text-display" class="marquee-content text-xl text-yellow-400 font-semibold uppercase tracking-widest">
                Selamat Datang di Aplikasi Jam Sholat
            </div>
        </div>
    </div>

    <script>
        const KOTA_ID = '1206'; // Bekasi
        let jadwalHariIni = {};
        let adzanPlayed = false;

        function updateDisplay() {
            // Ambil data dari "Memory" (LocalStorage)
            const savedText = localStorage.getItem('sholat_running_text');
            const savedAudio = localStorage.getItem('sholat_audio_url');
            
            if(savedText) document.getElementById('running-text-display').innerText = savedText;
            if(savedAudio) document.getElementById('audioAdzan').src = savedAudio;

            const now = new Date();
            const time = now.toLocaleTimeString('id-ID', {hour12:false});
            document.getElementById('jam').innerText = time;
            document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

            // Cek Adzan
            const currentMin = time.substring(0,5);
            ['subuh','dzuhur','ashar','maghrib','isya'].forEach(s => {
                if(jadwalHariIni[s] === currentMin && !adzanPlayed) {
                    document.getElementById('audioAdzan').play();
                    adzanPlayed = true;
                }
            });
            if(now.getSeconds() === 0) adzanPlayed = false;
        }

        async function fetchJadwal() {
            const t = new Date();
            const res = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${KOTA_ID}/${t.getFullYear()}/${t.getMonth()+1}/${t.getDate()}`);
            const json = await res.json();
            jadwalHariIni = json.data.jadwal;
            document.getElementById('nama-kota').innerText = json.data.lokasi;
            
            const container = document.getElementById('jadwal-container');
            container.innerHTML = '';
            ['subuh','terbit','dzuhur','ashar','maghrib','isya'].forEach(k => {
                container.innerHTML += `<div class="glass p-6 rounded-2xl text-center">
                    <div class="text-slate-500 text-xs uppercase mb-2">${k}</div>
                    <div class="text-3xl font-bold font-digital">${jadwalHariIni[k]}</div>
                </div>`;
            });
        }

        setInterval(updateDisplay, 1000);
        fetchJadwal();
    </script>
</body>
</html>

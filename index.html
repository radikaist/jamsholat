<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Sholat Digital Pro - Fixed & Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap');
        .font-digital { font-family: 'Orbitron', sans-serif; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .hidden { display: none !important; }
        .text-neon { text-shadow: 0 0 15px rgba(74, 222, 128, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-6">

    <audio id="audioAdzan" preload="auto"></audio>

    <div class="fixed top-4 right-4 flex gap-2 z-40">
        <button onclick="toggleAdmin()" class="p-2 glass rounded-full opacity-30 hover:opacity-100 transition text-sm">⚙️ Pengaturan</button>
        <button onclick="toggleFullscreen()" class="p-2 glass rounded-full opacity-30 hover:opacity-100 transition text-sm">🖥️ Fullscreen</button>
    </div>

    <div id="main-display" class="flex flex-col items-center justify-center h-full w-full flex-1 gap-6">
        <div class="text-center">
            <h1 id="nama-kota-display" class="text-xl uppercase tracking-[0.4em] text-slate-500 mb-2 font-semibold italic">Memuat Lokasi...</h1>
            
            <div id="jam" class="text-7xl md:text-[10rem] font-digital font-bold text-green-400 text-neon">00:00:00</div>
            
            <div id="countdown-box" class="mt-4 px-6 py-2 glass rounded-full inline-block border-green-500/20">
                <span id="countdown-label" class="text-slate-400 uppercase tracking-widest text-xs">Mencari Jadwal...</span>
                <span id="countdown-timer" class="text-yellow-400 font-digital ml-2 text-lg">--:--:--</span>
            </div>

            <div class="mt-6">
                <p id="tanggal-masehi" class="text-xl md:text-2xl text-slate-300 font-light"></p>
                <p id="tanggal-hijriah" class="text-lg md:text-xl text-yellow-500/80 font-medium tracking-wide mt-1"></p>
            </div>
        </div>

        <div id="jadwal-grid" class="grid grid-cols-4 lg:grid-cols-8 gap-3 w-full max-w-7xl">
            </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-slate-950/98 flex items-center justify-center hidden z-50 p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-xl border-green-500/30 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-green-400">⚙️ Pengaturan</h2>
                <button onclick="toggleAdmin()" class="text-slate-400 hover:text-white">Tutup [X]</button>
            </div>
            <div class="space-y-6 text-left">
                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold">📍 Cari Kota</label>
                    <div class="flex gap-2 mt-1">
                        <input type="text" id="search-city" placeholder="Nama kota..." class="flex-1 p-3 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-green-500 text-white">
                        <button onclick="searchCity()" class="bg-blue-600 px-4 rounded-xl text-white">Cari</button>
                    </div>
                    <div id="city-results" class="mt-2 space-y-1 max-h-32 overflow-y-auto text-white"></div>
                </div>
                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold">📜 Pesan Running Text</label>
                    <textarea id="input-text" rows="2" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 mt-1 outline-none text-white"></textarea>
                </div>
                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold">🎵 URL Audio Adzan</label>
                    <input type="text" id="input-audio" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 mt-1 text-white">
                </div>
                <button onclick="saveSettings()" class="w-full bg-green-600 hover:bg-green-700 p-4 rounded-xl font-bold text-lg transition text-white">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <div id="footer-marquee" class="w-full glass py-4 absolute bottom-0 left-0">
        <div class="overflow-hidden whitespace-nowrap">
            <div id="running-text-display" class="marquee-content text-xl text-yellow-400 font-semibold uppercase tracking-widest">Memuat pesan...</div>
        </div>
    </div>

    <script>
        let currentCityId = localStorage.getItem('s_city_id') || '1206';
        let jadwalHariIni = {};
        let adzanPlayed = false;

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('jam').innerText = `${h}:${m}:${s}`;
            document.getElementById('tanggal-masehi').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

            if (Object.keys(jadwalHariIni).length > 0) {
                calculateCountdown(now);
                checkAdzan(`${h}:${m}`);
            }
        }

        function calculateCountdown(now) {
            const listSholat = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            let nextSholat = null;
            let nextTime = null;

            for (let sholat of listSholat) {
                const timeArr = jadwalHariIni[sholat].split(':');
                const pDate = new Date();
                pDate.setHours(parseInt(timeArr[0]), parseInt(timeArr[1]), 0);

                if (pDate > now) {
                    nextSholat = sholat;
                    nextTime = pDate;
                    break;
                }
            }

            const labelEl = document.getElementById('countdown-label');
            const timerEl = document.getElementById('countdown-timer');

            if (nextSholat) {
                const diff = nextTime - now;
                const hours = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                labelEl.innerText = `Menuju ${nextSholat}`;
                timerEl.innerText = `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            } else {
                labelEl.innerText = "Menuju Subuh";
                timerEl.innerText = "--:--:--";
            }
        }

        function checkAdzan(timeHM) {
            const sholatWajib = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            sholatWajib.forEach(sName => {
                if (jadwalHariIni[sName] === timeHM && !adzanPlayed) {
                    const audio = document.getElementById('audioAdzan');
                    if(audio.src) audio.play().catch(e => console.log("Audio blocked by browser"));
                    adzanPlayed = true;
                }
            });
            if (new Date().getSeconds() === 0) adzanPlayed = false;
        }

        async function fetchJadwal() {
            try {
                const t = new Date();
                const res = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${currentCityId}/${t.getFullYear()}/${t.getMonth()+1}/${t.getDate()}`);
                const result = await res.json();
                jadwalHariIni = result.data.jadwal;
                document.getElementById('nama-kota-display').innerText = result.data.lokasi;

                // Safe Hijri calculation
                try {
                    const hijri = new Intl.DateTimeFormat('id-ID-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric'}).format(t);
                    document.getElementById('tanggal-hijriah').innerText = hijri;
                } catch(e) {
                    document.getElementById('tanggal-hijriah').innerText = ""; 
                }

                renderJadwal();
            } catch (e) {
                document.getElementById('nama-kota-display').innerText = "Koneksi Offline";
            }
        }

        function renderJadwal() {
            const list = [
                {k:'imsak', l:'Imsak'}, {k:'subuh', l:'Subuh'}, {k:'terbit', l:'Syuruq'}, {k:'dhuha', l:'Dhuha'},
                {k:'dzuhur', l:'Dzuhur'}, {k:'ashar', l:'Ashar'}, {k:'maghrib', l:'Maghrib'}, {k:'isya', l:'Isya'}
            ];
            const container = document.getElementById('jadwal-grid');
            container.innerHTML = '';
            list.forEach(item => {
                container.innerHTML += `
                    <div class="glass p-4 rounded-2xl text-center border-b-2 border-transparent hover:border-green-500 transition-all">
                        <div class="text-slate-500 text-[10px] uppercase mb-1 font-bold tracking-widest">${item.l}</div>
                        <div class="text-xl md:text-2xl font-bold font-digital text-white">${jadwalHariIni[item.k] || '--:--'}</div>
                    </div>`;
            });
        }

        async function searchCity() {
            const query = document.getElementById('search-city').value;
            if(query.length < 3) return;
            try {
                const res = await fetch(`https://api.myquran.com/v2/sholat/kota/cari/${query}`);
                const result = await res.json();
                const resultDiv = document.getElementById('city-results');
                resultDiv.innerHTML = '';
                result.data.forEach(item => {
                    resultDiv.innerHTML += `<button onclick="selectCity('${item.id}', '${item.lokasi}')" class="w-full text-left p-2 bg-slate-800 hover:bg-green-700 rounded-lg text-xs mb-1 text-white">${item.lokasi}</button>`;
                });
            } catch(e) { console.error("Search failed"); }
        }

        function selectCity(id, nama) {
            currentCityId = id;
            saveSettings();
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('hidden');
            if(!panel.classList.contains('hidden')) {
                document.getElementById('input-text').value = localStorage.getItem('s_text') || "Selamat Menjalankan Ibadah Sholat";
                document.getElementById('input-audio').value = localStorage.getItem('s_audio') || "https://www.islamcan.com/audio/adzan/azan1.mp3";
            }
        }

        function saveSettings() {
            localStorage.setItem('s_text', document.getElementById('input-text').value);
            localStorage.setItem('s_audio', document.getElementById('input-audio').value);
            localStorage.setItem('s_city_id', currentCityId);
            applySettings();
            fetchJadwal();
            if(!document.getElementById('admin-panel').classList.contains('hidden')) toggleAdmin();
        }

        function applySettings() {
            document.getElementById('running-text-display').innerText = localStorage.getItem('s_text') || "Selamat Menjalankan Ibadah Sholat";
            const audio = document.getElementById('audioAdzan');
            const savedAudio = localStorage.getItem('s_audio');
            if(savedAudio) audio.src = savedAudio;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        // Initialize
        setInterval(updateClock, 1000);
        applySettings();
        fetchJadwal();
    </script>
</body>
</html>

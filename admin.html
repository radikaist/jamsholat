<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Jam Sholat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="login-box" class="glass p-8 rounded-3xl w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-green-400">Admin Login</h2>
        <input type="password" id="pass-input" placeholder="Masukkan Password" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 mb-4 focus:outline-none focus:border-green-500 text-white">
        <button onclick="checkLogin()" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-xl font-bold transition">Masuk</button>
        <p id="error-msg" class="text-red-400 text-sm mt-3 text-center hidden">Password Salah!</p>
    </div>

    <div id="admin-dashboard" class="glass p-8 rounded-3xl w-full max-w-2xl hidden">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-green-400">Pengaturan Jam Sholat</h2>
            <button onclick="logout()" class="text-slate-400 hover:text-white text-sm">Logout</button>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm text-slate-400 mb-2 font-medium uppercase tracking-wider">Isi Pesan Running Text</label>
                <textarea id="set-running-text" rows="3" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-green-500"></textarea>
            </div>

            <div>
                <label class="block text-sm text-slate-400 mb-2 font-medium uppercase tracking-wider">URL Sumber Suara Adzan (.mp3)</label>
                <input type="text" id="set-audio-url" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-green-500" placeholder="https://domain.com/adzan.mp3">
                <p class="text-[10px] text-slate-500 mt-1">Kosongkan untuk menggunakan suara default.</p>
            </div>

            <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold transition">Simpan Perubahan</button>
            <a href="index.html" class="block text-center text-slate-400 mt-4 hover:underline text-sm">Lihat Tampilan Utama &rarr;</a>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "admin123"; // Ganti password Anda di sini

        function checkLogin() {
            const input = document.getElementById('pass-input').value;
            if(input === ADMIN_PASS) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadCurrentSettings();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function loadCurrentSettings() {
            document.getElementById('set-running-text').value = localStorage.getItem('sholat_running_text') || '"Jagalah sholatmu, maka Allah akan menjaga hidupmu"';
            document.getElementById('set-audio-url').value = localStorage.getItem('sholat_audio_url') || 'https://www.islamcan.com/audio/adzan/azan1.mp3';
        }

        function saveSettings() {
            const text = document.getElementById('set-running-text').value;
            const audio = document.getElementById('set-audio-url').value;

            localStorage.setItem('sholat_running_text', text);
            localStorage.setItem('sholat_audio_url', audio);

            alert('Pengaturan Berhasil Disimpan!');
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
